services:
  postgres:
    image: postgres:16-alpine
    container_name: lumbral-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lumbral_dev}
      POSTGRES_USER: ${POSTGRES_USER:-lumbral}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumbral}
    volumes:
      - lumbral_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lumbral} -d ${POSTGRES_DB:-lumbral_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lumbral_pgdata:
